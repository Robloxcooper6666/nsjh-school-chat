<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南實中校園聊天板 - GitHub Pages 版</title>
    <!-- 網站圖示設定 -->
    <link rel="icon" type="image/png" href="icon.png">
    <!-- 使用 Tailwind CSS 加快樣式開發 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .post-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }

        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }

        .form-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 動畫效果 */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.5s ease forwards;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-slate-800">

    <!-- 頂部標題 -->
    <header class="max-w-4xl mx-auto mb-10 text-center">
        <div class="inline-block bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full mb-4 uppercase tracking-widest">Live on GitHub Pages</div>
        <h1 class="text-4xl font-extrabold text-blue-900 mb-2">🏫 NSJH 校園即時看板</h1>
        <p class="text-slate-500 font-medium">班級、姓名會儲存在您的瀏覽器中，方便下次發言</p>
    </header>

    <!-- 發佈表單區 -->
    <section class="max-w-2xl mx-auto mb-12 bg-white rounded-3xl p-6 md:p-8 form-shadow border border-blue-100">
        <h2 class="text-xl font-bold mb-6 flex items-center text-blue-800">
            <span class="bg-blue-100 p-2 rounded-xl mr-3">✍️</span>
            新貼文
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2 italic underline underline-offset-4 decoration-blue-200">年級班級</label>
                <input type="text" id="user-class" placeholder="例如：901" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2 italic underline underline-offset-4 decoration-blue-200">顯示姓名</label>
                <input type="text" id="user-name" placeholder="你的名字" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
            </div>
        </div>
        <div class="mb-5">
            <label class="block text-sm font-bold text-slate-600 mb-2 italic underline underline-offset-4 decoration-blue-200">留言內容</label>
            <textarea id="post-content" rows="3" placeholder="今天發生了什麼有趣的事？" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition"></textarea>
        </div>
        <div class="flex flex-col md:flex-row items-center justify-between gap-4">
            <label class="flex items-center cursor-pointer group order-2 md:order-1">
                <input type="checkbox" id="is-anonymous" class="w-5 h-5 text-blue-600 border-slate-300 rounded-lg focus:ring-blue-500 transition-all cursor-pointer">
                <span class="ml-3 text-sm font-bold text-slate-500 group-hover:text-blue-600 transition">勾選即以「匿名同學」身份發佈</span>
            </label>
            <button onclick="submitPost()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-2xl shadow-lg shadow-blue-200 transition transform active:scale-95 flex items-center justify-center order-1 md:order-2">
                🚀 發佈動態
            </button>
        </div>
        <div class="mt-8 pt-4 border-t border-slate-100 flex items-center justify-center">
            <p class="text-[10px] text-slate-400 italic text-center">
                註：點擊發佈將導向 GitHub Issues 進行最後確認
            </p>
        </div>
    </section>

    <!-- 同步狀態 -->
    <div id="status-container" class="max-w-7xl mx-auto text-center hidden mb-8">
        <div class="inline-flex items-center px-4 py-2 rounded-full bg-blue-50 text-blue-600 text-xs font-bold shadow-inner">
            <svg class="animate-spin h-3 w-3 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            正在從 GitHub 資料庫同步最新訊息...
        </div>
    </div>

    <!-- 留言板主體 -->
    <main id="board" class="max-w-7xl mx-auto masonry-grid">
        <!-- 骨架屏 (Skeleton) -->
        <div class="post-card bg-white rounded-3xl p-8 border-t-8 border-slate-100 opacity-60 animate-pulse">
            <div class="h-4 bg-slate-200 rounded w-1/4 mb-6"></div>
            <div class="h-4 bg-slate-200 rounded w-full mb-3"></div>
            <div class="h-4 bg-slate-200 rounded w-full mb-3"></div>
            <div class="h-4 bg-slate-200 rounded w-2/3"></div>
        </div>
    </main>

    <script>
        // 🛠️ 核心配置 - 已針對您的 Repo 進行設定
        const CONFIG = {
            username: 'Robloxcooper6666', 
            repo: 'nsjh-school-chat',         
            refreshInterval: 30000 
        };

        const elements = {
            class: document.getElementById('user-class'),
            name: document.getElementById('user-name'),
            content: document.getElementById('post-content'),
            anonymous: document.getElementById('is-anonymous'),
            board: document.getElementById('board'),
            status: document.getElementById('status-container')
        };

        // 1. 初始化讀取 LocalStorage (本地快取)
        window.onload = () => {
            const savedData = JSON.parse(localStorage.getItem('nsjh_user_cache') || '{}');
            if (savedData.class) elements.class.value = savedData.class;
            if (savedData.name) elements.name.value = savedData.name;
            fetchGitHubIssues();
        };

        // 2. 提交貼文處理
        function submitPost() {
            const userClass = elements.class.value.trim();
            const userName = elements.name.value.trim();
            const content = elements.content.value.trim();
            const isAnon = elements.anonymous.checked;

            if (!userClass || !userName || !content) {
                alert('請完整填寫班級、姓名與留言內容！');
                return;
            }

            // 儲存至本地快取
            localStorage.setItem('nsjh_user_cache', JSON.stringify({
                class: userClass,
                name: userName
            }));

            // 建立標題與內容
            const displayTitle = `[${userClass}] ${isAnon ? "匿名同學" : userName}`;
            const displayBody = isAnon 
                ? `${content}\n\n--- (系統紀錄：匿名發佈)` 
                : `${content}\n\n--- 由 ${userClass} ${userName} 發佈`;

            // 導向 GitHub Issues 頁面
            const githubUrl = `https://github.com/${CONFIG.username}/${CONFIG.repo}/issues/new?title=${encodeURIComponent(displayTitle)}&body=${encodeURIComponent(displayBody)}`;
            
            window.open(githubUrl, '_blank');
            elements.content.value = ""; // 清空內容框
        }

        // 3. 獲取資料
        async function fetchGitHubIssues() {
            elements.status.classList.remove('hidden');
            try {
                // 向 GitHub API 請求公開的 Issues
                const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues?state=open&sort=created&direction=desc`);
                if (!response.ok) throw new Error();
                const issues = await response.json();
                renderBoard(issues);
            } catch (error) {
                elements.board.innerHTML = `<div class="col-span-full text-center py-20 px-6 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                    <p class="text-slate-400 font-bold mb-2 text-lg text-red-400">連線失敗！</p>
                    <p class="text-slate-400 text-sm">請確認 GitHub 倉庫的 Issues 功能已在 Settings 中開啟。</p>
                </div>`;
            } finally {
                elements.status.classList.add('hidden');
            }
        }

        // 4. 渲染看板介面
        function renderBoard(issues) {
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
            
            if (issues.length === 0) {
                elements.board.innerHTML = `<div class="col-span-full text-center py-24 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                    <p class="text-slate-300 font-black text-2xl mb-2 italic">看板目前是空的</p>
                    <p class="text-slate-400 text-sm font-bold">快來發佈這學期的第一則消息吧！</p>
                </div>`;
                return;
            }

            elements.board.innerHTML = issues.map((issue, index) => {
                const date = new Date(issue.created_at).toLocaleDateString('zh-TW', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                // 過濾掉自動生成的分隔線內容
                const cleanContent = issue.body ? issue.body.split('---')[0] : '（無內容）';

                return `
                    <div class="post-card bg-white rounded-[2rem] shadow-sm border-t-[12px] p-6 md:p-8 animate-slide-in" style="border-color: ${colors[index % colors.length]}">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="font-black text-2xl text-slate-800 leading-snug tracking-tight">${escapeHtml(issue.title)}</h3>
                            <span class="text-[10px] font-black bg-slate-50 text-slate-300 px-2 py-1 rounded-lg border border-slate-100 ml-3">ID: ${issue.number}</span>
                        </div>
                        <p class="text-slate-600 text-base leading-relaxed mb-10 whitespace-pre-wrap">${escapeHtml(cleanContent)}</p>
                        <div class="flex items-center justify-between border-t border-slate-50 pt-6">
                            <div class="flex items-center">
                                <div class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-xs font-black text-slate-300 mr-3 border-2 border-white shadow-sm ring-1 ring-slate-100 uppercase">
                                    ${issue.user.login[0]}
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[11px] font-black text-slate-700 uppercase tracking-wider">${issue.user.login}</span>
                                    <span class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">Board Sync</span>
                                </div>
                            </div>
                            <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-4 py-1.5 rounded-full shadow-inner">${date}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 安全處理 HTML 字串
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 自動刷新
        setInterval(fetchGitHubIssues, CONFIG.refreshInterval);
    </script>
</body>
</html>
