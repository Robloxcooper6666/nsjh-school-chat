<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南勢國中即時看板 更新中...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .post-card { animation: slideIn 0.3s ease-out forwards; border-radius: 1.5rem; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-cat { background-color: #2563eb !important; color: white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .admin-panel { display: none; }

        /* 右下角按鈕群組樣式 */
        .fab-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: flex-end;
        }
        .fab-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fab-button:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body class="min-h-screen pb-40">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-4 py-4 mb-6 shadow-sm">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 onclick="handleAdminTrigger()" class="font-black text-2xl tracking-tighter text-slate-800 cursor-pointer select-none">
                南勢國中即時看板<br>更新中...💩 <span class="text-blue-600">LIVE</span>
            </h1>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div id="status-tag" class="inline-flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full text-[10px] font-black text-slate-400">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                        <span id="status-text">連線中</span>
                    </div>
                    <div id="online-counter" class="text-[10px] font-bold text-blue-500 mt-1 uppercase tracking-tighter">
                        在線人數: --
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div id="admin-area" class="admin-panel max-w-xl mx-auto px-4 mb-8">
        <div class="bg-slate-900 text-white p-6 rounded-[2rem] shadow-2xl border-4 border-slate-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-amber-400">管理員控制台</h2>
                <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 px-4 py-1 rounded-full text-xs font-bold transition">退出</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                    <p class="text-[10px] text-slate-400 font-bold mb-1">當前連線總數</p>
                    <p id="admin-conn-count" class="text-3xl font-black text-blue-400">0</p>
                </div>
                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 flex flex-col justify-center">
                    <button onclick="clearLocalHistory()" class="text-xs text-red-400 font-bold hover:bg-red-500/10 p-2 rounded-lg transition">🗑️ 清空本地紀錄</button>
                </div>
            </div>

            <div class="text-[10px] font-mono text-slate-500">
                <p class="mb-2">● 即時連線清單 (ClientID):</p>
                <div id="client-list" class="bg-black/30 p-3 rounded-xl max-h-32 overflow-y-auto no-scrollbar">
                    等待數據...
                </div>
            </div>
        </div>
    </div>

    <section class="max-w-xl mx-auto px-4 mb-8">
        <div class="bg-white rounded-[2rem] p-6 shadow-xl shadow-blue-900/5 border border-white">
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6" id="cat-tabs">
                <button onclick="setCategory(this, '🌿 生活')" class="active-cat whitespace-nowrap px-4 py-2 rounded-xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">🌿 生活</button>
                <button onclick="setCategory(this, '💖 告白')" class="whitespace-nowrap px-4 py-2 rounded-xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">💖 告白</button>
                <button onclick="setCategory(this, '📚 課業')" class="whitespace-nowrap px-4 py-2 rounded-xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">📚 課業</button>
                <button onclick="setCategory(this, '🤫 秘密')" class="whitespace-nowrap px-4 py-2 rounded-xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">🤫 秘密</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="text" id="input-class" placeholder="班級" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/30 font-bold text-sm transition-all border border-transparent focus:bg-white">
                <input type="text" id="input-name" placeholder="名字" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/30 font-bold text-sm transition-all border border-transparent focus:bg-white">
            </div>
            <textarea id="input-content" rows="2" placeholder="想分享什麼？" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/30 mb-4 text-sm font-medium transition-all border border-transparent focus:bg-white"></textarea>

            <button onclick="broadcast()" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <span>🚀 發佈到全校看板</span>
            </button>
        </div>
    </section>

    <main id="message-list" class="max-w-xl mx-auto px-4 space-y-4"></main>

    <div class="fab-container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfVdJKPBpUTQW44wfvPzzb6Oo3dEpRyJDZhlaavA51dYOK5Xw/viewform?usp=header" 
           target="_blank" 
           class="fab-button flex items-center gap-2 bg-amber-500 text-white px-5 py-3 rounded-full shadow-lg border-2 border-white/20 active:scale-95">
            <span class="text-lg">⚠️</span>
            <span class="font-black text-sm tracking-wider">問題回報</span>
        </a>
        <a href="https://robloxcooper6666.github.io/nsjh-school-chat/help.html" 
           target="_blank" 
           class="fab-button flex items-center gap-2 bg-blue-600 text-white px-5 py-3 rounded-full shadow-lg border-2 border-white/20 active:scale-95">
            <span class="text-lg">❓</span>
            <span class="font-black text-sm tracking-wider">幫助中心</span>
        </a>
    </div>

    <script>
        // 🛠️ 配置區
        const ABLY_KEY = '2eR4lg.LsxDLQ:um2A4_AugjiGw4kjkgAuw56q7AAGGTJa_rAHv0fk7UA';
        const ADMIN_PWD = '123'; 

        const myId = 'NSJH-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myId });
        const channel = ably.channels.get('nsjh-main-v7');

        let currentCat = '🌿 生活';
        let secretCounter = 0;

        function handleAdminTrigger() {
            secretCounter++;
            if (secretCounter >= 5) {
                const pass = prompt("請輸入管理員通行密碼：");
                if (pass === ADMIN_PWD) {
                    document.getElementById('admin-area').style.display = 'block';
                } else {
                    alert("密碼錯誤！");
                }
                secretCounter = 0;
            }
        }

        ably.connection.on('connected', () => {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            dot.classList.replace('bg-slate-300', 'bg-green-500');
            dot.classList.add('animate-pulse');
            text.innerText = "即時連線中";
            text.classList.replace('text-slate-400', 'text-green-600');
            channel.presence.enter();
        });

        channel.presence.subscribe(() => {
            channel.presence.get((err, members) => {
                if (err) return;
                const count = members.length;
                document.getElementById('online-counter').innerText = `目前在線: ${count} 人`;
                if(document.getElementById('admin-area').style.display === 'block') {
                    document.getElementById('admin-conn-count').innerText = count;
                    const listHtml = members.map(m => `<div>> ${m.clientId} ${m.clientId === myId ? '(你)' : ''}</div>`).join('');
                    document.getElementById('client-list').innerHTML = listHtml;
                }
            });
        });

        channel.subscribe('msg', (message) => {
            displayMessage(message.data);
            saveToLocal(message.data);
        });

        function broadcast() {
            const cls = document.getElementById('input-class').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const content = document.getElementById('input-content').value.trim();
            if (!cls || !name || !content) return alert('不能留白唷！');
            const payload = {
                id: Date.now() + Math.random().toString(36).substr(2, 4),
                cat: currentCat, cls: cls, name: name, content: content,
                time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })
            };
            channel.publish('msg', payload);
            localStorage.setItem('nsjh_user', JSON.stringify({cls, name}));
            document.getElementById('input-content').value = '';
        }

        function displayMessage(data) {
            if(document.getElementById('msg-' + data.id)) return;
            const list = document.getElementById('message-list');
            const html = `
                <div id="msg-${data.id}" class="post-card bg-white p-6 shadow-sm border border-slate-100 flex flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black text-slate-400 tracking-widest uppercase bg-slate-50 px-2 py-1 rounded-md border border-slate-100">${data.cat}</span>
                        <span class="text-[9px] font-bold text-slate-300">${data.time}</span>
                    </div>
                    <p class="text-slate-700 font-bold text-[15px] mb-4 leading-relaxed">${escape(data.content)}</p>
                    <div class="text-[10px] font-black text-blue-600/50 italic border-t border-slate-50 pt-3">
                        ${escape(data.cls)} · ${escape(data.name)}
                    </div>
                </div>
            `;
            list.insertAdjacentHTML('afterbegin', html);
        }

        function setCategory(btn, name) {
            document.querySelectorAll('#cat-tabs button').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            currentCat = name;
        }

        function saveToLocal(data) {
            let history = JSON.parse(localStorage.getItem('nsjh_chat_history_v7') || '[]');
            history.push(data);
            if(history.length > 40) history.shift();
            localStorage.setItem('nsjh_chat_history_v7', JSON.stringify(history));
        }

        function clearLocalHistory() {
            if(confirm("確定要清除您設備上的歷史紀錄嗎？（不用想了人家的裝置不會被刪除聊天記錄）")) {
                localStorage.removeItem('nsjh_chat_history_v7');
                location.reload();
            }
        }

        function escape(s) {
            const t = document.createElement('p');
            t.textContent = s;
            return t.innerHTML;
        }

        window.onload = () => {
            const history = JSON.parse(localStorage.getItem('nsjh_chat_history_v7') || '[]');
            history.forEach(displayMessage);
            const user = JSON.parse(localStorage.getItem('nsjh_user') || '{}');
            if(user.cls) document.getElementById('input-class').value = user.cls;
            if(user.name) document.getElementById('input-name').value = user.name;
        };
    </script>
</body>
</html>
