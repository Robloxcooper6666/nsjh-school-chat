<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南勢國中即時看板 | Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .post-card { animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .active-cat { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-4 py-4 mb-6 shadow-sm">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-2xl tracking-tighter text-slate-800">南中 <span class="text-blue-600">LIVE</span></h1>
            <div id="conn-status" class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full text-[10px] font-black text-slate-400">
                <span class="w-2 h-2 rounded-full bg-slate-300"></span> 正在連線...
            </div>
        </div>
    </nav>

    <section class="max-w-xl mx-auto px-4 mb-10">
        <div class="bg-white rounded-[2.5rem] p-6 shadow-xl shadow-blue-900/5 border border-white">
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6" id="cat-btns">
                <button onclick="changeCat(this, '🌿 生活', 'blue')" class="active-cat whitespace-nowrap px-5 py-2.5 rounded-2xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">🌿 生活</button>
                <button onclick="changeCat(this, '💖 告白', 'pink')" class="whitespace-nowrap px-5 py-2.5 rounded-2xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">💖 告白</button>
                <button onclick="changeCat(this, '📚 課業', 'emerald')" class="whitespace-nowrap px-5 py-2.5 rounded-2xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">📚 課業</button>
                <button onclick="changeCat(this, '🤫 秘密', 'purple')" class="whitespace-nowrap px-5 py-2.5 rounded-2xl border-2 border-slate-100 text-xs font-black text-slate-500 transition-all">🤫 秘密</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="text" id="ipt-class" placeholder="年級班級 (如 701)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none transition-all font-bold text-sm">
                <input type="text" id="ipt-name" placeholder="你的暱稱" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none transition-all font-bold text-sm">
            </div>
            <textarea id="ipt-content" rows="3" placeholder="在這裡分享任何事..." class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none transition-all text-sm font-medium mb-4"></textarea>

            <button onclick="sendMsg()" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-black py-4 rounded-[1.5rem] shadow-lg transition-all transform active:scale-[0.97]">
                🚀 立即發佈到看板
            </button>
        </div>
    </section>

    <main id="msg-board" class="max-w-xl mx-auto px-4 space-y-4"></main>

    <script>
        // 🔒 金鑰已配置完成
        const ABLY_KEY = '2eR4lg.LsxDLQ:um2A4_AugjiGw4kjkgAuw56q7AAGGTJa_rAHv0fk7UA';

        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('nsjh-v6-main');
        let currentCat = '🌿 生活';
        let currentStyle = 'blue';

        // 連線狀態監聽
        ably.connection.on('connected', () => {
            const status = document.getElementById('conn-status');
            status.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> 即時連線中';
            status.classList.replace('text-slate-400', 'text-green-600');
            status.classList.add('bg-green-50');
        });

        // 初始化與讀取緩存
        window.onload = () => {
            const history = JSON.parse(localStorage.getItem('nsjh_chat_history') || '[]');
            history.forEach(renderMsg);

            const user = JSON.parse(localStorage.getItem('nsjh_user_cache') || '{}');
            if(user.cls) document.getElementById('ipt-class').value = user.cls;
            if(user.name) document.getElementById('ipt-name').value = user.name;
        };

        function changeCat(btn, name, style) {
            document.querySelectorAll('#cat-btns button').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            currentCat = name; currentStyle = style;
        }

        // 接收訊息
        channel.subscribe('msg', (m) => {
            const data = m.data;
            renderMsg(data);
            saveToLocal(data);
        });

        // 發送訊息
        function sendMsg() {
            const cls = document.getElementById('ipt-class').value.trim();
            const name = document.getElementById('ipt-name').value.trim();
            const content = document.getElementById('ipt-content').value.trim();

            if(!cls || !name || !content) return alert('請填寫完整內容喔！');

            const payload = {
                id: Date.now() + Math.random().toString(36).substr(2, 4),
                cat: currentCat, style: currentStyle,
                cls: cls, name: name, content: content,
                time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })
            };

            channel.publish('msg', payload);
            localStorage.setItem('nsjh_user_cache', JSON.stringify({cls, name}));
            document.getElementById('ipt-content').value = '';
        }

        function renderMsg(data) {
            if(document.getElementById('msg-' + data.id)) return;

            const board = document.getElementById('msg-board');
            const colorMap = {
                blue: 'border-blue-500', pink: 'border-pink-500',
                emerald: 'border-emerald-500', purple: 'border-purple-500'
            };

            const html = `
                <div id="msg-${data.id}" class="post-card bg-white p-6 rounded-[2rem] border-l-[8px] ${colorMap[data.style]} shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-50 px-2 py-1 rounded-lg">${data.cat}</span>
                        <span class="text-[9px] font-bold text-slate-300 italic">${data.time}</span>
                    </div>
                    <p class="text-slate-700 font-bold text-base leading-relaxed mb-6">${escapeHtml(data.content)}</p>
                    <div class="flex items-center justify-between border-t border-slate-50 pt-4">
                        <span class="text-[11px] font-black text-blue-600/50 italic">${escapeHtml(data.cls)} · ${escapeHtml(data.name)}</span>
                        <button onclick="this.parentElement.parentElement.style.opacity=0.3" class="text-[10px] text-slate-300 hover:text-red-400">檢舉</button>
                    </div>
                </div>
            `;
            board.insertAdjacentHTML('afterbegin', html);
        }

        function saveToLocal(data) {
            let history = JSON.parse(localStorage.getItem('nsjh_chat_history') || '[]');
            history.push(data);
            if(history.length > 50) history.shift();
            localStorage.setItem('nsjh_chat_history', JSON.stringify(history));
        }

        function escapeHtml(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }
    </script>
</body>
</html>
